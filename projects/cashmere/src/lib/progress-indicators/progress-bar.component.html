<div class="hc-progress-bar-wrapper">
    <div class="hc-progress-bar-container bar-{{ color }}">
        <div
            class="hc-progress-bar-fill bar-{{ color }}"
            [class.hc-progress-bar-indeterminate]="!isDeterminate"
            [style.width]="isDeterminate ? progress + '%' : '100%'"
        >
            @if (showValue && isDeterminate) {
            <span class="hc-progress-bar-value bar-{{ color }}">{{ progress }}%</span>
            }
        </div>
    </div>
    @if (label) {
    <div class="hc-progress-bar-label bar-{{ color }}">{{ label }}</div>
    }
</div>
