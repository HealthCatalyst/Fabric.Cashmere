@if (_direction && !_hidden) { @if (routerLink) {
<a
    tabIndex="-1"
    class="hc-tab-{{ _direction }} hc-text-ellipsis"
    [class.hc-tab-tight]="_tight"
    [style.max-width]="maxWidth"
    [routerLink]="routerLink"
    routerLinkActive="active"
    (isActiveChange)="_isActiveChange($event)"
    [queryParams]="queryParams"
    [routerLinkActiveOptions]="exactRouteMatch ? {exact: true} : {}"
    (click)="_tabClickHandler($event)"
>
    @if (_htmlTitle) {
    <ng-container [ngTemplateOutlet]="_htmlTitle.tabTitle"></ng-container>
    }
    {{ tabTitle }}
</a>
} @else {
<a
    tabIndex="-1"
    class="hc-tab-{{ _direction }} hc-text-ellipsis"
    [class.hc-tab-tight]="_tight"
    [class.active]="_active"
    [style.max-width]="maxWidth"
    (click)="_tabClickHandler($event)"
>
    @if (_htmlTitle) {
    <ng-container [ngTemplateOutlet]="_htmlTitle.tabTitle"></ng-container>
    }
    {{ tabTitle }}
</a>
} }
<ng-template #tabWithoutRouting>
    <a
        tabIndex="-1"
        class="hc-tab-{{ _direction }} hc-text-ellipsis"
        [class.hc-tab-tight]="_tight"
        [class.active]="_active"
        [style.max-width]="maxWidth"
        (click)="_tabClickHandler($event)"
    >
        @if (_htmlTitle) {
        <ng-container [ngTemplateOutlet]="_htmlTitle.tabTitle"></ng-container>
        }
        {{ tabTitle }}
    </a>
</ng-template>
<ng-template #tabContent>
    <ng-content></ng-content>
</ng-template>
