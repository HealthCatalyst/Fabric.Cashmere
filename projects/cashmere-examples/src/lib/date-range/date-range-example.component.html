<div class="demo-box">
    <button
        hc-button
        hcDateRange
        title="Date Range"
        buttonStyle="link"
        (selectedDateRangeChanged)="updateRange($event)"
        (selectedPresetChanged)="updatePreset($event)"
        [selectedDate]="selected"
        [options]="options"
        #pickerOne
    >
        <span class="label">Date range:</span>
        <span class="value">
            @if (range.fromDate && range.toDate) {
            <span>{{ range.fromDate | date: 'MM/dd/yyyy' }} - {{ range.toDate | date: 'MM/dd/yyyy' }}</span>
            } @if (range.fromDate && !range.toDate) {
            <span>{{ range.fromDate | date: 'MM/dd/yyyy' }} or later</span>
            } @if (!range.fromDate && range.toDate) {
            <span>{{ range.toDate | date: 'MM/dd/yyyy' }} or earlier</span>
            } @if (!range.fromDate && !range.toDate) {
            <span>No dates selected</span>
            }
        </span>
        <hc-icon fontIcon="icon-chev-down" class="hc-icon-right" hcIconSm></hc-icon>
    </button>

    <div class="demo-extras">
        <hc-checkbox [formControl]="optionsControlExcludeWeekends">Don't allow weekend dates</hc-checkbox>
        <hc-checkbox [formControl]="optionsControlStartDateRequired">Start date required</hc-checkbox>
        <hc-checkbox [formControl]="optionsControlEndDateRequired">End date required</hc-checkbox>
        <div>
            Selected preset:
            <strong>{{ presetSelection }}</strong>
        </div>
    </div>
</div>
