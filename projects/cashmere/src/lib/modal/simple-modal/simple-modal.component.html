<hc-modal class="hc-confirm-modal">
    @if (options.headerText) {
    <hc-modal-header>
        <span class="hc-confirm-modal-header-inner">
            @if (options.icon) {
            <span [ngClass]="[options.icon, 'hc-confirm-modal-header-ico']"></span>
            }
            {{ options.headerText }}
        </span>
    </hc-modal-header>
    }
    <hc-modal-body
        [class.hc-confirm-modal-minimal-body]="!options.headerText"
        [class.hc-confirm-modal-preserve-whitespace]="options.preserveMessageWhitespace"
        class="hc-confirm-modal-body"
    >
        <div class="hc-confirm-message-container">
            @if (options.icon && !options.headerText) {
            <span [ngClass]="[options.icon, 'hc-confirm-modal-body-ico']"></span>
            } @if (options.messageHTML) {
            <div [innerHtml]="options.messageHTML"></div>
            } @if (!options.messageHTML) {
            <div>{{ options.message }}</div>
            }
        </div>
    </hc-modal-body>
    <hc-modal-footer [class.hc-confirm-modal-minimal-footer]="!options.headerText" class="hc-confirm-modal-footer-container">
        <div>
            @if (options.footerTooltipText) {
            <span class="hc-confirm-modal-info-hover" [hcTooltip]="options.footerTooltipText"></span>
            }
        </div>
        <div>
            @if (options.cancelButtonText) {
            <button hc-button class="hc-confirm-modal-cancel-btn" [buttonStyle]="options.cancelButtonStyle || 'link'" (click)="cancel()">
                {{ options.cancelButtonText }}
            </button>
            }
            <button
                hc-button
                [buttonStyle]="options.confirmButtonStyle || (options.confirmButtonIsDestructive ? 'destructive' : 'primary')"
                (click)="confirm()"
            >
                @if (options.confirmButtonIcon) {
                <span [ngClass]="[options.confirmButtonIcon, 'hc-icon-left']"></span>
                }
                {{ options.confirmButtonText }}
            </button>
        </div>
    </hc-modal-footer>
</hc-modal>
