<div class="hc-pagination-container" [class.hc-pagination-container-tight]="tight">
    @if (!hidePageSize) {
    <div class="hc-font-sm hc-page-detail-container">
        <label class="hc-page-detail-label">Showing:</label>
        <hc-select
            class="hc-page-detail-select"
            [formControl]="_pageSizeControl"
            (change)="_changePageSize($event.value)"
            (focus)="isFocused = true"
            (blur)="isFocused = false"
        >
            @for (pageSizeOption of _displayedPageSizeOptions; track pageSizeOption) {
            <option [value]="pageSizeOption">
                {{ isFocused ? pageSizeOption : pageSize === pageSizeOption && pageSizeOption > length ? 'all' : pageSizeOption }}
            </option>
            }
        </hc-select>
        <label class="hc-page-detail-entries">
            of
            <strong>{{ length }}</strong>
            entries
        </label>
    </div>
    }

    <div class="hc-page-btns-container" [class.hc-page-btns-container-tight]="tight">
        <button
            hc-button
            buttonStyle="secondary"
            class="hc-page-button hc-page-left-button"
            (click)="_previousPage()"
            [disabled]="!totalPages || _isFirstPage"
        >
            <span class="hc-page-button-chevron hc-page-button-chevron-left"></span>
            <span>PREV</span>
        </button>
        <!-- large width page navigation buttons -->
        @if (displayWidth === 'lg') { @for (page of _visiblePages; track page) {
        <button
            hc-button
            buttonStyle="secondary"
            class="hc-page-button hc-page-inner-button"
            [disabled]="!page"
            [class.hc-page-button-current]="page === pageNumber"
            (click)="_goToPage(page!)"
        >
            @if (!!page) {
            <span>{{ page }}</span>
            } @if (!page) {
            <span class="hc-page-button-ellipsis"></span>
            }
        </button>
        } }
        <!-- medium width page navigation buttons -->
        @if (displayWidth === 'md') { @for (page of _collapsedVisiblePages; track page) {
        <button
            hc-button
            buttonStyle="secondary"
            class="hc-page-button hc-page-inner-button"
            [disabled]="!page"
            [class.hc-page-button-current]="page === pageNumber"
            (click)="_goToPage(page!)"
        >
            @if (!!page) {
            <span>{{ page }}</span>
            } @if (!page) {
            <span class="hc-page-button-ellipsis"></span>
            }
        </button>
        } }
        <button
            hc-button
            buttonStyle="secondary"
            class="hc-page-button hc-page-right-button"
            (click)="_nextPage()"
            [disabled]="!totalPages || _isLastPage"
        >
            <span>NEXT</span>
            <span class="hc-page-button-chevron"></span>
        </button>
    </div>
</div>
